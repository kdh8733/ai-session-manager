<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>디렉토리 선택</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1e1e2e; --bg2: #181825; --surface: #313244; --border: #45475a;
      --text: #cdd6f4; --text-dim: #6c7086; --accent: #89b4fa; --radius: 6px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }
    body { display: flex; flex-direction: column; }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .header h3 { flex: 1; font-size: 15px; }

    /* Path bar */
    .path-bar {
      display: flex; align-items: center; gap: 4px;
      padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
      overflow-x: auto;
    }
    .path-seg {
      background: var(--surface); border: none; color: var(--accent); cursor: pointer;
      padding: 3px 8px; border-radius: var(--radius); font-size: 13px; white-space: nowrap;
    }
    .path-seg:hover { background: var(--border); }
    .path-sep { color: var(--text-dim); font-size: 12px; }

    /* Directory list */
    .dir-list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .dir-entry {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 20px; cursor: pointer; border-bottom: 1px solid rgba(69,71,90,.3);
      font-size: 14px;
    }
    .dir-entry:hover { background: var(--surface); }
    .dir-entry.selected { background: var(--accent); color: var(--bg); }
    .dir-entry.selected .dir-icon { filter: brightness(0); }
    .dir-icon { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
    .dir-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Quick access */
    .quick-entry {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; cursor: pointer; border-bottom: 1px solid rgba(69,71,90,.3);
      font-size: 14px;
    }
    .quick-entry:hover { background: var(--surface); }
    .quick-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
    .quick-name { flex: 1; }
    .quick-path { font-size: 12px; color: var(--text-dim); }

    /* Footer */
    .footer {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .footer input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 7px 10px; border-radius: var(--radius); font-size: 13px;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
    }
    .btn { padding: 7px 16px; border: none; border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 600; }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { opacity: .9; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="header">
  <h3>디렉토리 ���택</h3>
</div>

<div id="path-bar" class="path-bar"></div>

<div id="dir-list" class="dir-list"></div>

<div class="footer">
  <input id="selected-path" type="text" placeholder="경로를 선택하세요..." readonly />
  <button id="btn-select" class="btn btn-primary">선택</button>
  <button id="btn-cancel" class="btn btn-secondary">취소</button>
</div>

<script>
const listEl = document.getElementById('dir-list');
const pathBar = document.getElementById('path-bar');
const pathInput = document.getElementById('selected-path');
let currentPath = '';

async function browse(path) {
  const res = await fetch('/api/browse?path=' + encodeURIComponent(path || ''));
  const data = await res.json();
  currentPath = data.current || path || '';
  pathInput.value = currentPath;

  renderPathBar(currentPath);
  listEl.innerHTML = '';

  if (!currentPath) {
    // Quick access roots
    data.dirs.forEach(d => {
      const el = document.createElement('div');
      el.className = 'quick-entry';
      const icon = d.name.includes('drive') ? '💾' : d.name === '/' ? '🖥️' : '🏠';
      el.innerHTML = '<span class="quick-icon">' + icon + '</span>'
        + '<span class="quick-name">' + esc(d.name) + '</span>'
        + '<span class="quick-path">' + esc(d.path) + '</span>';
      el.addEventListener('click', () => browse(d.path));
      listEl.appendChild(el);
    });
    return;
  }

  // Parent (..)
  if (data.parent) {
    const up = document.createElement('div');
    up.className = 'dir-entry';
    up.innerHTML = '<span class="dir-icon">⬆️</span><span class="dir-name">..</span>';
    up.addEventListener('click', () => browse(data.parent));
    listEl.appendChild(up);
  }

  data.dirs.forEach(d => {
    const el = document.createElement('div');
    el.className = 'dir-entry';
    el.innerHTML = '<span class="dir-icon">📁</span><span class="dir-name">' + esc(d.name) + '</span>';
    el.addEventListener('dblclick', () => browse(d.path));
    el.addEventListener('click', () => {
      listEl.querySelectorAll('.dir-entry.selected').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      pathInput.value = d.path;
    });
    listEl.appendChild(el);
  });
}

function renderPathBar(p) {
  pathBar.innerHTML = '';
  if (!p) { pathBar.innerHTML = '<span style="color:var(--text-dim)">바로가기</span>'; return; }

  const parts = p.split('/').filter(Boolean);
  // Root
  const rootBtn = document.createElement('button');
  rootBtn.className = 'path-seg';
  rootBtn.textContent = '/';
  rootBtn.addEventListener('click', () => browse('/'));
  pathBar.appendChild(rootBtn);

  let acc = '';
  parts.forEach((part, i) => {
    acc += '/' + part;
    const sep = document.createElement('span');
    sep.className = 'path-sep';
    sep.textContent = '›';
    pathBar.appendChild(sep);

    const btn = document.createElement('button');
    btn.className = 'path-seg';
    btn.textContent = part;
    const target = acc;
    btn.addEventListener('click', () => browse(target));
    pathBar.appendChild(btn);
  });
}

// Select
document.getElementById('btn-select').addEventListener('click', () => {
  const path = pathInput.value.trim();
  if (!path) return;
  if (window.opener && !window.opener.closed) {
    window.opener._onDirSelected(path);
  }
  window.close();
});

// Cancel
document.getElementById('btn-cancel').addEventListener('click', () => window.close());

// Keyboard: Enter to select, Escape to cancel
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') window.close();
  if (e.key === 'Enter') document.getElementById('btn-select').click();
});

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

browse('');
</script>
</body>
</html>
